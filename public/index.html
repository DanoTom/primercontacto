<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRIMER CONTACTO</title>
  <link rel="stylesheet" href="estilo.css">
</head>
<body>

  <!-- ═══ PANTALLA: INICIO ═══ -->
  <section id="pantalla-inicio" class="pantalla activa">
    <h1>:: PRIMER CONTACTO ::</h1>
    <p class="subtitulo">ESTACIÓN DE INTERCEPCIÓN DE SEÑALES</p>

    <label for="campo-nombre">IDENTIFICACIÓN DEL OPERADOR</label>
    <input id="campo-nombre" type="text" maxlength="12" autocomplete="off"
           placeholder="TU NOMBRE (MÁX. 12)">

    <label>FICHA DEL PERSONAL</label>
    <div id="grilla-avatares"></div>

    <div class="acciones">
      <button id="boton-crear" class="principal">CREAR SALA</button>
      <div class="separador">— O —</div>
      <input id="campo-codigo" type="text" maxlength="4" autocomplete="off"
             placeholder="CÓDIGO" class="campo-codigo">
      <button id="boton-unirse">UNIRSE A SALA</button>
    </div>

    <div id="mensaje-inicio" class="mensaje" role="alert"></div>
  </section>

  <!-- ═══ PANTALLA: LOBBY ═══ -->
  <section id="pantalla-lobby" class="pantalla">
    <h1>:: SALA DE OPERACIONES ::</h1>
    <p class="subtitulo">CÓDIGO DE ACCESO</p>
    <div id="codigo-sala" class="codigo-grande"></div>
    <p class="subtitulo">COMPARTILO CON TU EQUIPO</p>

    <div id="conteo-lobby" class="conteo"></div>
    <ul id="lista-jugadores"></ul>

    <button id="boton-iniciar" class="principal" hidden>INICIAR TRANSMISIÓN</button>
    <div id="nota-iniciar" class="mensaje"></div>
  </section>

  <!-- ═══ PANTALLA: PARTIDA (placeholder hasta la Etapa 3) ═══ -->
  <section id="pantalla-partida" class="pantalla">
    <h1>:: TRANSMISIÓN INICIADA ::</h1>
    <p class="subtitulo">LA TERMINAL SE CONSTRUYE EN LA PRÓXIMA ETAPA</p>
  </section>

  <script src="avatares.js"></script>
  <script src="app.js"></script>
</body>
</html>
